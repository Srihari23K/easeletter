{% extends "base.html" %}

{% block content %}
<h2 class="heading">Available Letter Templates</h2>

<div class="search-wrapper">
    <input
        type="text"
        id="templateSearch"
        class="search-input"
        placeholder="Search for a letter (e.g. medical leave, hostel, bonafide certificate)..."
        autocomplete="off"
    >
    <div id="searchResults" class="search-results"></div>
</div>

{% if templates %}
    <table>
        <thead>
            <tr>
                <th>Template Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for template in templates %}
            <tr>
                <td>{{ template.title }}</td>
                <td>
                    <a href="{{ url_for('editor', template_key=template.key) }}">Use Template</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>No templates available.</p>
{% endif %}

<script>
    const allTemplates = {{ templates|tojson }};

    const searchInput = document.getElementById('templateSearch');
    const searchResults = document.getElementById('searchResults');

    function normalize(str) {
        return (str || "").toLowerCase().replace(/[_-]/g, ' ').trim();
    }

    function renderResults(matches) {
        searchResults.innerHTML = "";

        if (matches.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'search-result-empty';
            empty.textContent = 'No matching templates found.';
            searchResults.appendChild(empty);
            searchResults.classList.add('active');
            return;
        }

        matches.forEach((t) => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.textContent = t.title;
            item.setAttribute('role', 'button');
            item.addEventListener('click', () => {
                window.location.href = `/editor/${t.key}`;
            });
            searchResults.appendChild(item);
        });

        searchResults.classList.add('active');
    }

    function runSearch() {
        const query = normalize(searchInput.value);

        if (!query) {
            searchResults.classList.remove('active');
            searchResults.innerHTML = "";
            return;
        }

        const matches = allTemplates.filter((t) =>
            normalize(t.title).includes(query) || normalize(t.key).includes(query)
        );

        renderResults(matches);
    }

    searchInput.addEventListener('input', runSearch);

    searchInput.addEventListener('focus', () => {
        if (searchInput.value.trim()) runSearch();
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) {
            searchResults.classList.remove('active');
        }
    });

    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const first = searchResults.querySelector('.search-result-item');
            if (first) first.click();
        }
    });
</script>

{% endblock %}
