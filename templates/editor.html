{% extends "base.html" %}

{% block content %}
<h2>{{ template.title }}</h2>

{% if error %}
<div class="error-banner">{{ error }}</div>
{% endif %}

<form action="" method="POST" class="form-container" id="letterForm">

    {% for field in placeholders %}
<div class="form-group">
    <label>{{ field.replace("_"," ").title() }}</label>

    {% if "date" in field %}
        <input type="date" name="{{ field }}" class="date-input"
               value="{{ form_data.get(field, '') if form_data else '' }}" required>

    {% elif field == "subject" %}
        <input type="text" name="{{ field }}" id="subjectInput"
               value="{{ form_data.get(field, '') if form_data else '' }}"

    {% else %}
        <input type="text" name="{{ field }}"
               value="{{ form_data.get(field, '') if form_data else '' }}" required>
    {% endif %}

</div>
{% endfor %}

    <button type="submit" class="btn btn-primary" id="generateBtn">Generate Letter</button>
</form>

<p style="margin-top: 15px;">
    <a href="{{ url_for('index') }}">← Back to Templates</a>
</p>

<script>
   
    (function () {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;

        document.querySelectorAll('input[type="date"]').forEach((input) => {
            input.min = todayStr;
        });
    })();
    (function () {
        const form = document.getElementById('letterForm');
        const generateBtn = document.getElementById('generateBtn');
        const subjectInput = document.getElementById('subjectInput');

        form.addEventListener('submit', () => {
            if (subjectInput && subjectInput.value.trim()) {
                generateBtn.textContent = "Processing .......";
            } else {
                generateBtn.textContent = "Generating...";
            }
            generateBtn.disabled = true;
        });
    })();
</script>
{% endblock %}
